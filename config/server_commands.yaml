# config/server_commands.yaml
#
# Commands the ModelServerManager uses to launch each role's llama-server.
# Only needed once you leave single_endpoint_mode (Phase 2+).
#
# Notes for an 8-12GB GPU:
#   -ngl 99   offload all layers to GPU; lower it (e.g. -ngl 20) if you OOM.
#   -c 8192   context size; smaller context = less KV-cache VRAM.
#   --jinja   use the model's built-in chat template (required for Qwen2.5).
#   Roles that share a gguf+port (supervisor / critics) reuse one server.

servers:
  supervisor:
    port: 8001
    command: >
      llama-server
      -m "models/Qwen2.5-7B-Instruct-Q4_K_M.gguf"
      --host 127.0.0.1 --port 8001
      --jinja -c 8192 -ngl 99

  coder_fast:
    port: 8002
    command: >
      llama-server
      -m "models/Qwen2.5-Coder-3B-Instruct-Q4_K_M.gguf"
      --host 127.0.0.1 --port 8002
      --jinja -c 8192 -ngl 99

  coder_strong:
    port: 8003
    command: >
      llama-server
      -m "models/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf"
      --host 127.0.0.1 --port 8003
      --jinja -c 8192 -ngl 99

  summarizer:
    port: 8007
    command: >
      llama-server
      -m "models/Qwen2.5-3B-Instruct-Q4_K_M.gguf"
      --host 127.0.0.1 --port 8007
      --jinja -c 4096 -ngl 99

  vision:
    port: 8006
    command: >
      llama-server
      -m "models/Qwen2.5-VL-7B-Instruct-Q4_K_M.gguf"
      --mmproj "models/Qwen2.5-VL-7B-Instruct-mmproj-f16.gguf"
      --host 127.0.0.1 --port 8006
      -c 4096 -ngl 99
