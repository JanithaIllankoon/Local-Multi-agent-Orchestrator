<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Multi-Agent Orchestrator</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <span class="logo">🧠 Local Multi-Agent Orchestrator</span>
    <button id="new-chat" title="Start a new session">+ New chat</button>
    <select id="mode" title="Orchestration mode">
      <option value="auto">Auto</option>
      <option value="simple">Simple</option>
      <option value="coding">Coding</option>
      <option value="deep_review">Deep Review</option>
    </select>
  </header>

  <main>
    <!-- Far left: saved sessions -->
    <section class="panel sessions">
      <h2>Sessions</h2>
      <div id="sessions"></div>
    </section>

    <!-- Left: the conversation with the user -->
    <section class="panel chat">
      <h2>Chat</h2>
      <div id="messages"></div>
      <div class="composer">
        <textarea id="input" placeholder="Ask the orchestrator..."></textarea>
        <div class="composer-actions">
          <input type="file" id="image-input" accept="image/*" multiple hidden />
          <button id="attach" title="Attach image(s) for the vision agent">📎</button>
          <button id="send">Run</button>
        </div>
      </div>
      <div id="attachments"></div>
    </section>

    <!-- Right: the internal agent steps (for debugging / curiosity) -->
    <section class="panel trace">
      <h2>Agent Trace</h2>
      <div id="trace"></div>
    </section>
  </main>

  <footer><span id="status">Idle</span></footer>

  <script src="/static/app.js"></script>
</body>
</html>
